name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm test

  package-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run make:mac
      - uses: actions/upload-artifact@v4
        with:
          name: robin-macos-artifacts
          path: out/make/**/*
          if-no-files-found: error
